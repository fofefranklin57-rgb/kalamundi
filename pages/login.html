<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connexion et inscription — Kalamundi, La Plume du Monde" />
  <title>Connexion — Kalamundi</title>
  <link rel="icon" href="/assets/img/favicon.ico" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/login.css" />
  <script>(function(){var t=localStorage.getItem('kala_theme');if(t==='dark')document.documentElement.classList.add('theme-dark-pre');if(t==='sepia')document.documentElement.classList.add('theme-sepia-pre');})()</script>
</head>
<body>

  <div class="login-page">

    <!-- Panneau gauche — visuel -->
    <div class="login-visual" aria-hidden="true">
      <div class="login-visual__content">
        <div class="login-visual__logo">Kalamundi</div>
        <p class="login-visual__tagline">La Plume du Monde</p>
        <p class="login-visual__sub">Publie tes œuvres. Lis le monde entier.<br>Dans toutes les langues.</p>
      </div>
    </div>

    <!-- Panneau droit — formulaire -->
    <div class="login-panel">
      <div class="login-panel__inner">

        <!-- Tabs connexion / inscription -->
        <div class="tabs login-tabs" role="tablist">
          <button class="tab tab--active" role="tab" data-tab="connexion" aria-selected="true">
            Connexion
          </button>
          <button class="tab" role="tab" data-tab="inscription" aria-selected="false">
            Inscription
          </button>
        </div>

        <!-- Alerte globale -->
        <div class="alert alert--error login-alert hidden" role="alert"></div>
        <div class="alert alert--success login-success hidden" role="status"></div>

        <!-- ====== FORMULAIRE CONNEXION ====== -->
        <form class="login-form" data-form="connexion" novalidate>
          <div class="form-group">
            <label class="form-label form-label--required" for="login-email">Adresse email</label>
            <input
              class="form-input"
              type="email"
              id="login-email"
              name="email"
              autocomplete="email"
              placeholder="ton@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="login-password">Mot de passe</label>
            <div class="input-password">
              <input
                class="form-input"
                type="password"
                id="login-password"
                name="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
              <button type="button" class="input-password__toggle" aria-label="Afficher le mot de passe">
                👁
              </button>
            </div>
          </div>

          <div class="login-forgot">
            <button type="button" class="btn btn--ghost btn--sm" data-action="forgot">
              Mot de passe oublié ?
            </button>
          </div>

          <button type="submit" class="btn btn--primary btn--full btn--lg">
            Se connecter
          </button>

          <div class="login-separator">
            <span>ou</span>
          </div>

          <button type="button" class="btn btn--outline btn--full" data-action="google">
            <img src="/assets/img/icons/google.svg" width="18" height="18" alt="" />
            Continuer avec Google
          </button>
        </form>

        <!-- ====== FORMULAIRE INSCRIPTION ====== -->
        <form class="login-form hidden" data-form="inscription" novalidate>
          <div class="form-group">
            <label class="form-label form-label--required" for="reg-nom">Ton prénom ou pseudonyme</label>
            <input
              class="form-input"
              type="text"
              id="reg-nom"
              name="nom"
              autocomplete="name"
              placeholder="Ex : Aminata, Kofi, Jean-Pierre..."
              required
            />
            <span class="form-hint">Ce nom sera affiché sur tes œuvres</span>
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="reg-email">Adresse email</label>
            <input
              class="form-input"
              type="email"
              id="reg-email"
              name="email"
              autocomplete="email"
              placeholder="ton@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="reg-password">Mot de passe</label>
            <div class="input-password">
              <input
                class="form-input"
                type="password"
                id="reg-password"
                name="password"
                autocomplete="new-password"
                placeholder="8 caractères minimum"
                minlength="8"
                required
              />
              <button type="button" class="input-password__toggle" aria-label="Afficher le mot de passe">
                👁
              </button>
            </div>
            <div class="password-strength" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <div class="form-check">
              <input type="checkbox" id="reg-cgu" name="cgu" required />
              <label class="form-check__label" for="reg-cgu">
                J'accepte les <a href="/pages/cgu.html" target="_blank">Conditions d'utilisation</a>
                et la <a href="/pages/confidentialite.html" target="_blank">Politique de confidentialité</a>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn--full btn--lg">
            Créer mon compte
          </button>

          <div class="login-separator"><span>ou</span></div>

          <button type="button" class="btn btn--outline btn--full" data-action="google">
            <img src="/assets/img/icons/google.svg" width="18" height="18" alt="" />
            Continuer avec Google
          </button>
        </form>

        <!-- ====== FORMULAIRE MOT DE PASSE OUBLIÉ ====== -->
        <form class="login-form hidden" data-form="forgot" novalidate>
          <p class="login-forgot__intro">
            Saisis ton adresse email — on t'envoie un lien pour réinitialiser ton mot de passe.
          </p>
          <div class="form-group">
            <label class="form-label form-label--required" for="forgot-email">Adresse email</label>
            <input
              class="form-input"
              type="email"
              id="forgot-email"
              name="email"
              autocomplete="email"
              placeholder="ton@email.com"
              required
            />
          </div>
          <button type="submit" class="btn btn--primary btn--full">
            Envoyer le lien
          </button>
          <button type="button" class="btn btn--ghost btn--full btn--sm" data-action="back-to-login">
            ← Retour à la connexion
          </button>
        </form>

      </div>
    </div>
  </div>

  <script type="module" src="/assets/js/login.js"></script>
  <script type="module" src="/assets/js/theme-init.js"></script>
</body>
</html>
