<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation d'examen — Kalamundi</title>
  <link rel="icon" href="/assets/img/favicon.ico" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <script src="/assets/js/theme-init.js"></script>
  <style>
    /* ── Config ─────────────────────────────────────────────── */
    .sim-config {
      max-width: 560px; margin: var(--spacing-2xl) auto;
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-xl); padding: var(--spacing-xl);
    }
    .sim-config h2 { margin-bottom: var(--spacing-md); }

    /* ── En-tête examen ─────────────────────────────────────── */
    .exam-header {
      background: linear-gradient(90deg,#0d2137,#1B4332);
      color: #fff; padding: var(--spacing-md) var(--spacing-lg);
      display: flex; align-items: center; justify-content: space-between;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0; flex-wrap: wrap; gap: 8px;
    }
    .exam-header__titre { font-weight: 700; font-size: var(--font-size-lg); }
    .exam-header__meta  { font-size: var(--font-size-sm); opacity: .8; }
    .exam-timer { font-size: 1.4rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .exam-timer.urgent { color: #ff6b6b; animation: pulse .5s infinite alternate; }
    @keyframes pulse { to { opacity: .6; } }

    /* ── Barre de progression questions ────────────────────────  */
    .exam-progress {
      height: 4px; background: rgba(255,255,255,.3);
      border-radius: 0; overflow: hidden;
    }
    .exam-progress__fill { height: 100%; background: #4ade80; transition: width .3s; }

    /* ── Corps examen ───────────────────────────────────────── */
    .exam-body {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: var(--spacing-xl); max-width: 720px; margin: 0 auto;
    }
    .question-num { font-size: 11px; color: var(--text-secondary); font-weight: 700;
                    text-transform: uppercase; margin-bottom: var(--spacing-sm); }
    .question-enonce { font-size: var(--font-size-lg); font-weight: 600;
                       color: var(--text-primary); margin-bottom: var(--spacing-lg);
                       line-height: 1.6; }

    /* ── Choix ──────────────────────────────────────────────── */
    .choix-grid { display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .choix-btn {
      display: flex; align-items: center; gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-lg);
      border: 2px solid var(--border-color); border-radius: var(--radius-md);
      background: var(--bg-card); color: var(--text-primary);
      cursor: pointer; text-align: left; font-size: var(--font-size-sm);
      font-weight: 500; transition: .15s; width: 100%;
    }
    .choix-btn:hover:not(:disabled) { border-color: var(--color-primary); background: var(--bg-secondary,#f0f7f4); }
    .choix-btn.selected   { border-color: var(--color-primary); background: var(--bg-secondary,#e8f5e9); }
    .choix-btn.correct    { border-color: #2e7d32; background: #e8f5e9; color: #2e7d32; }
    .choix-btn.incorrect  { border-color: #b71c1c; background: #ffebee; color: #b71c1c; }
    .choix-btn:disabled   { cursor: not-allowed; }
    .choix-lettre {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--border-color); color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; transition: .15s;
    }
    .choix-btn.selected  .choix-lettre { background: var(--color-primary); color: #fff; }
    .choix-btn.correct   .choix-lettre { background: #2e7d32; color: #fff; }
    .choix-btn.incorrect .choix-lettre { background: #b71c1c; color: #fff; }

    /* ── Explication ────────────────────────────────────────── */
    .explication-box {
      margin-top: var(--spacing-lg); padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-md); font-size: var(--font-size-sm); line-height: 1.6;
    }
    .explication-box.correct  { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
    .explication-box.incorrect{ background: #ffebee; border-left: 4px solid #b71c1c; color: #7f0000; }

    /* ── Navigation ─────────────────────────────────────────── */
    .exam-nav { display: flex; justify-content: space-between; align-items: center;
                margin-top: var(--spacing-xl); padding-top: var(--spacing-lg);
                border-top: 1px solid var(--border-color); }

    /* ── Résultat final ─────────────────────────────────────── */
    .resultat-final {
      max-width: 680px; margin: var(--spacing-2xl) auto;
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    .resultat-final__hero {
      text-align: center; padding: var(--spacing-2xl);
      color: #fff;
    }
    .rf-score { font-size: clamp(3rem,10vw,5rem); font-weight: 900; }
    .rf-verdict { font-size: var(--font-size-xl); font-weight: 700; margin-top: var(--spacing-sm); }
    .rf-detail  { opacity: .85; margin-top: var(--spacing-sm); }

    .resultat-final__body { padding: var(--spacing-xl); }

    /* Lacunes */
    .lacune-card {
      background: #fff3e0; border: 1px solid #ffcc80; border-radius: var(--radius-md);
      padding: var(--spacing-md) var(--spacing-lg); margin-bottom: var(--spacing-sm);
    }
    .lacune-card__titre { font-weight: 700; color: #e65c00; }
    .lacune-card__detail { font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: 4px; }

    /* Recommandations */
    .reco-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: var(--spacing-sm); }
    .reco-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); padding: var(--spacing-md); font-size: var(--font-size-sm);
    }
    .reco-card__type { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
    .reco-card__titre { font-weight: 600; margin: 4px 0; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner { border: 3px solid var(--border-color); border-top-color: var(--color-primary);
               border-radius: 50%; width: 36px; height: 36px;
               animation: spin .8s linear infinite; margin: 4rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- NAVBAR minimal -->
  <header class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="/index.html" class="navbar__logo">📚 Kalamundi</a>
      <div class="navbar__actions">
        <a href="/pages/education.html#repetiteur" class="btn btn--ghost btn--sm">← Éducation</a>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <main class="container" style="padding-block: var(--spacing-lg)">
      <div id="app"><div class="spinner"></div></div>
    </main>
  </div>

  <script type="module" src="/assets/js/examen-sim.js"></script>
  <script type="module" src="/assets/js/i18n-boot.js"></script>
</body>
</html>
