<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Occasion — tous les livres d'occasion — Kalamundi</title>
  <link rel="icon" href="/assets/img/favicon.ico" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <style>
    .occasion-wrapper { max-width: 1000px; margin: var(--spacing-xl) auto; padding: 0 var(--spacing-lg); }
    .occasion-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:var(--spacing-md); margin-bottom: var(--spacing-lg); }
    .occasion-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--spacing-md); }
    .occasion-card { background: var(--bg-card); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); overflow:hidden; display:flex; flex-direction:column; }
    .occasion-card__cover { aspect-ratio: 2/3; width:100%; object-fit:cover; background: var(--bg-secondary); }
    .occasion-card__body { padding: var(--spacing-sm) var(--spacing-md) var(--spacing-md); display:flex; flex-direction:column; gap:4px; flex:1; }
    .occasion-card__titre { font-size: var(--font-size-sm); font-weight:600; line-height:1.3; }
    .occasion-card__meta { display:flex; justify-content:space-between; align-items:center; font-size: var(--font-size-xs); color: var(--text-light); }
    .occasion-card__prix { color: var(--color-primary); font-weight:700; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="navbar__inner">
      <a href="/index.html" class="navbar__logo"><img src="/assets/img/logo-mark-km.png" alt="" aria-hidden="true"><span>Kalamundi</span></a>
    </div>
  </header>

  <div class="page-wrapper">
    <main class="main-content">
      <div class="occasion-wrapper">

        <div class="occasion-header">
          <div>
            <h1>📚 Occasion</h1>
            <p style="color:var(--text-light)">Tous les exemplaires papier mis en vente par la communauté.</p>
          </div>
          <a href="/pages/vendre.html" class="btn btn--primary btn--sm">Vendre le mien</a>
        </div>

        <div id="occasion-liste" aria-live="polite">
          <div class="empty-state"><div class="empty-state__icon">⏳</div><p class="empty-state__title">Chargement…</p></div>
        </div>

      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="/assets/js/occasion-listing.js"></script>
  <script type="module" src="/assets/js/theme-init.js"></script>
  <script type="module" src="/assets/js/i18n-boot.js"></script>
</body>
</html>
