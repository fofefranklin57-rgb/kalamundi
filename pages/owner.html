<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Owner — Kalamundi</title>
  <meta name="theme-color" content="#0D2B1F" />
  <link rel="manifest" href="/manifest.json" />
  <script src="/assets/js/theme-init.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pri:    #1B4332;
      --pri-d:  #0D2B1F;
      --pri-l:  #2D6A4F;
      --acc:    #D4A017;
      --green:  #2D9E5F;
      --red:    #C0392B;
      --bg:     #F0F4F1;
      --card:   #FFFFFF;
      --text:   #1A1A1A;
      --text2:  #555;
      --text3:  #999;
      --border: #D0E4D8;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--pri-d);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar__logo { display:flex; align-items:center; gap:8px; font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .owner-logo-mark { width:34px; height:34px; border-radius:50%; object-fit:cover; }
    .topbar__sub  { font-size: 10px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
    .topbar__refresh { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .topbar__refresh:active { background: rgba(255,255,255,0.2); }

    /* ── Nav tabs (bottom) ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--pri-d);
      display: flex;
      z-index: 100;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .bnav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 4px 12px;
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 10px; cursor: pointer; transition: color 0.15s;
    }
    .bnav-btn .icon { font-size: 20px; }
    .bnav-btn.active { color: var(--acc); }

    /* ── Sections ── */
    .section { display: none; padding: 16px; }
    .section.active { display: block; }

    /* ── KPI cards ── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .kpi-card {
      background: var(--card); border-radius: var(--radius); padding: 16px 14px;
      box-shadow: var(--shadow);
    }
    .kpi-card__icon { font-size: 22px; margin-bottom: 6px; }
    .kpi-card__val  { font-size: 22px; font-weight: 800; line-height: 1; }
    .kpi-card__lbl  { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .kpi-card--green .kpi-card__val { color: var(--green); }
    .kpi-card--acc   .kpi-card__val { color: var(--acc); }
    .kpi-card--red   .kpi-card__val { color: var(--red); }

    /* ── Block card ── */
    .block {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px;
    }
    .block__title { font-size: 13px; font-weight: 700; color: var(--pri); margin-bottom: 12px; }

    /* ── Bar chart ── */
    .bars { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 3px; }
    .bar-col__bar { width: 100%; background: var(--pri-l); border-radius: 4px 4px 0 0; min-height: 3px; }
    .bar-col__lbl { font-size: 8px; color: var(--text3); white-space: nowrap; }
    .bar-col__val { font-size: 8px; color: var(--text2); font-weight: 700; }

    /* ── List rows ── */
    .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .list-row:last-child { border-bottom: none; }
    .list-row__val { font-weight: 700; color: var(--pri); }
    .mini-note { font-size: 11px; color: var(--text3); line-height: 1.45; margin-top: 6px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th, .data-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .data-table th { color: var(--pri); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
    .data-table td:last-child, .data-table th:last-child { text-align: right; }
    .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; background: #e8f5e9; color: #065f46; font-size: 10px; font-weight: 700; }
    .insight-card { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); margin-bottom: 10px; border-left: 4px solid var(--pri-l); }
    .insight-card__title { font-size: 13px; font-weight: 800; color: var(--pri); margin-bottom: 4px; }
    .insight-card__body { font-size: 12px; color: var(--text2); line-height: 1.45; }

    /* ── Progress bar ── */
    .progress { height: 5px; background: var(--bg); border-radius: 99px; margin-top: 4px; }
    .progress__fill { height: 5px; background: var(--pri-l); border-radius: 99px; }

    /* ── Pub cards ── */
    .pub-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 12px; }
    .pub-card__img { width: 100%; height: 110px; object-fit: cover; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 12px; }
    .pub-card__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pub-card__body { padding: 12px; }
    .pub-card__titre { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .pub-card__meta { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
    .pub-card__stats { display: flex; gap: 14px; font-size: 11px; color: var(--text2); margin-bottom: 10px; }
    .pub-card__actions { display: flex; gap: 8px; }
    .badge-on  { background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .badge-off { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }

    /* ── Boutons ── */
    .btn-sm { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; }
    .btn-primary { background: var(--pri); color: white; }
    .btn-danger  { background: #fee2e2; color: #991b1b; }
    .btn-toggle  { background: #fef3c7; color: #92400e; }
    .btn-success { background: #d1fae5; color: #065f46; }
    .btn-sm:active { opacity: 0.8; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 80px; right: 18px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--acc); color: #000; border: none;
      font-size: 26px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      z-index: 99;
    }
    .fab.visible { display: flex; }

    /* ── Config ── */
    .cfg-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-bottom: 10px; }
    .cfg-row label { font-size: 12px; color: var(--text2); margin-bottom: 3px; display: block; }
    .cfg-row__cle { font-size: 10px; color: var(--text3); font-family: monospace; }
    .cfg-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
    .cfg-save { padding: 8px 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* ── Modale ── */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-end; }
    .modal.open { display: flex; }
    .modal-sheet { background: white; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-height: 85dvh; overflow-y: auto; }
    .modal-sheet h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--pri); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }

    /* ── Toast ── */
    .toast-wrap { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; }
    .toast-item { background: #1a1a1a; color: white; padding: 10px 16px; border-radius: 10px; font-size: 13px; text-align: center; animation: fadeIn 0.2s; }
    .toast-item.success { background: #065f46; }
    .toast-item.error   { background: #991b1b; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px 16px; color: var(--text3); font-size: 14px; }

    /* ── Login screen ── */
    #login-screen {
      display: none; position: fixed; inset: 0;
      background: var(--pri-d);
      flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; z-index: 999;
    }
    .login-logo { margin-bottom: 12px; }
    .login-logo img { width:72px; height:72px; border-radius:50%; object-fit:cover; }
    .login-title { color: white; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .login-sub   { color: var(--acc); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    .login-box   { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
    .login-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: white; font-size: 15px;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.35); }
    .login-input:focus { outline: none; border-color: var(--acc); }
    .login-btn {
      width: 100%; padding: 15px;
      background: var(--acc); color: #000;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      margin-top: 4px;
    }
    .login-btn:disabled { opacity: 0.6; }
    .login-err {
      display: none; color: #ff6b6b;
      font-size: 13px; text-align: center;
      background: rgba(255,0,0,0.1); padding: 10px;
      border-radius: 8px;
    }
    .login-hint { color: rgba(255,255,255,0.3); font-size: 11px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN (affiché si non connecté) -->
  <div id="login-screen">
    <div class="login-logo"><img src="/assets/img/logo-mark-km.png" alt="Kalamundi"></div>
    <div class="login-title">Kalamundi Owner</div>
    <div class="login-sub">Accès privé</div>
    <div class="login-box">
      <input class="login-input" type="email" id="login-email" placeholder="Email administrateur"
        autocomplete="email" inputmode="email" />
      <input class="login-input" type="password" id="login-pwd" placeholder="Mot de passe"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') submitLogin()" />
      <div class="login-err" id="login-error"></div>
      <button class="login-btn" id="login-btn" onclick="submitLogin()">Se connecter</button>
      <div class="login-hint">Réservé à l'administrateur Kalamundi</div>
    </div>
  </div>

  <!-- APP SHELL (masqué jusqu'à connexion) -->
  <div id="app-shell" style="display:none">

  <!-- TOPBAR -->
  <header class="topbar">
    <div>
      <div class="topbar__logo"><img src="/assets/img/logo-mark-km.png" alt="" class="owner-logo-mark" aria-hidden="true"><span>Kalamundi</span></div>
      <div class="topbar__sub">Owner Dashboard</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="topbar__refresh" onclick="rafraichir()">↻</button>
      <button class="topbar__refresh" onclick="submitLogout()" style="background:rgba(255,80,80,0.2)">⏻</button>
    </div>
  </header>

  <!-- SECTIONS -->
  <section class="section active" id="sec-finance">
    <div id="finance-content"><div class="loading">⏳ Chargement…</div></div>
  </section>

  <section class="section" id="sec-croissance">
    <div id="croissance-content"><div class="loading">⏳ Chargement…</div></div>
  </section>

  <section class="section" id="sec-donnees">
    <div id="donnees-content"><div class="loading">⏳ Chargement…</div></div>
  </section>

  <section class="section" id="sec-pub">
    <div id="pub-content"><div class="loading">⏳ Chargement…</div></div>
  </section>

  <section class="section" id="sec-config">
    <div id="config-content"><div class="loading">⏳ Chargement…</div></div>
  </section>

  <!-- FAB (créer bannière pub) -->
  <button class="fab" id="fab" onclick="ouvrirModalePub()">＋</button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav-btn active" onclick="showSection('finance', this)">
      <span class="icon">💰</span>Finance
    </button>
    <button class="bnav-btn" onclick="showSection('croissance', this)">
      <span class="icon">📈</span>Croissance
    </button>
    <button class="bnav-btn" onclick="showSection('donnees', this)">
      <span class="icon">🧭</span>Données
    </button>
    <button class="bnav-btn" onclick="showSection('pub', this)">
      <span class="icon">📢</span>Pub
    </button>
    <button class="bnav-btn" onclick="showSection('config', this)">
      <span class="icon">⚙️</span>Config
    </button>
  </nav>

  <!-- MODALE bannière pub -->
  <div class="modal" id="modal-pub" onclick="fermerModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <h3 id="modal-titre">Nouvelle bannière</h3>
      <input type="hidden" id="pub-id" />
      <div class="form-group">
        <label>Titre (interne)</label>
        <input type="text" id="pub-titre" placeholder="Nom de la campagne" />
      </div>
      <div class="form-group">
        <label>URL image</label>
        <input type="url" id="pub-image" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Lien de destination</label>
        <input type="url" id="pub-lien" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Texte bouton</label>
        <input type="text" id="pub-cta" value="En savoir plus" />
      </div>
      <div class="form-group">
        <label>Page cible</label>
        <select id="pub-page">
          <option value="all">Toutes les pages</option>
          <option value="home">Accueil</option>
          <option value="library">Bibliothèque</option>
          <option value="reader">Lecteur</option>
          <option value="education">Éducation</option>
          <option value="work">Fiche œuvre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date début</label>
        <input type="date" id="pub-debut" />
      </div>
      <div class="form-group">
        <label>Date fin</label>
        <input type="date" id="pub-fin" />
      </div>
      <div class="modal-actions">
        <button onclick="fermerModal()" style="background:#f1f5f9;color:#333">Annuler</button>
        <button onclick="sauvegarderBanniere()" style="background:var(--pri);color:white">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  </div><!-- /app-shell -->

  <script type="module" src="/assets/js/owner.js?v=20260621b" defer></script>
  <script type="module" src="/assets/js/i18n-boot.js"></script>
</body>
</html>
