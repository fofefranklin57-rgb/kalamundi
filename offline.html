<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — Kalamundi</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .offline-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: var(--spacing-xl);
      gap: var(--spacing-lg);
    }
    .offline-icon { font-size: 72px; }
    .offline-title { color: var(--color-primary); }
    .offline-text { color: var(--text-secondary); max-width: 400px; }
  </style>
</head>
<body>
  <div class="offline-page">
    <div class="offline-icon">📖</div>
    <h1 class="offline-title">Vous êtes hors ligne</h1>
    <p class="offline-text">
      Pas de connexion internet détectée. Les pages déjà visitées sont disponibles hors ligne.
      Reconnectez-vous pour accéder au catalogue complet.
    </p>
    <button class="btn btn--primary" onclick="window.location.reload()">Réessayer</button>
    <a href="/" class="btn btn--outline">Retour à l'accueil</a>
  </div>
</body>
</html>
